name: Build SpotD Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"
  JAVA_VERSION: "17"
  WORKING_DIR: artifacts/spotd-mobile

jobs:
  build-release:
    name: "Release APK"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Prebuild Android
        working-directory: ${{ env.WORKING_DIR }}
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build Release APK
        working-directory: ${{ env.WORKING_DIR }}/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      # 🔍 Show files (debug step)
      - name: List APK files
        run: find ${{ env.WORKING_DIR }} -name "*.apk"

      # ✅ Upload EXACT APK (fixed)
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SpotD-release-apk
          path: artifacts/spotd-mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

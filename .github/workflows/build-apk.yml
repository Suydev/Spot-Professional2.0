name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK with EAS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build APK via EAS
        working-directory: artifacts/spotd-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --output ./spotd-release.apk
        continue-on-error: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotd-android-apk
          path: artifacts/spotd-mobile/spotd-release.apk
          if-no-files-found: ignore
          retention-days: 14

  build-local:
    name: Build APK locally (no EAS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Pre-build Android project
        working-directory: artifacts/spotd-mobile
        run: npx expo prebuild --platform android --clean

      - name: Build release APK with Gradle
        working-directory: artifacts/spotd-mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Find and upload APK
        run: |
          APK_PATH=$(find artifacts/spotd-mobile/android -name "*.apk" -type f | head -1)
          echo "APK found at: $APK_PATH"
          cp "$APK_PATH" ./spotd-release.apk || echo "No APK found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotd-android-local-apk
          path: spotd-release.apk
          if-no-files-found: ignore
          retention-days: 14

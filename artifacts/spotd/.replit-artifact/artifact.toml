kind = "web"
previewPath = "/"
title = "SpotD — Spotify & YouTube Downloader"
version = "1.0.0"
id = "artifacts/spotd"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21433

[services.development]
run = "pnpm --filter @workspace/spotd run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spotd", "run", "build" ]
publicDir = "artifacts/spotd/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21433"
BASE_PATH = "/"
